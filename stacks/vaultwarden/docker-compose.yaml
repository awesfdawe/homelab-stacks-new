networks:
  proxy:
    external: true

services:
  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:1.35.4
    restart: unless-stopped
    volumes:
      - /mnt/docker-volumes/vaultwarden:/data
    environment:
      - DOMAIN=https://${DOMAIN}
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=false
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vw.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.middlewares=chain-local@file"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.routers.vaultwarden.tls.certResolver=letsencrypt"
      - "traefik.http.routers.vaultwarden.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.vaultwarden.tls.domains[0].sans=*.${DOMAIN}"
    security_opt:
      - no-new-privileges:true