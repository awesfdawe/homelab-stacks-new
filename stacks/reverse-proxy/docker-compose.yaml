networks:
  proxy:
    external: true
  socket_proxy:
    driver: bridge
    internal: true
  crowdsec:
    driver: bridge

services:
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:3.2.14
    container_name: socket-proxy-traefik
    restart: unless-stopped
    networks:
      - socket_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - CONTAINERS=1
      - EVENTS=1
    read_only: true
    tmpfs:
      - /run
    security_opt:
      - no-new-privileges:true

  traefik:
    image: traefik:v3.6.11
    container_name: traefik
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_started
      crowdsec:
        condition: service_healthy
    networks:
      - proxy
      - socket_proxy
      - crowdsec
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /mnt/docker-volumes/traefik/acme:/acme
      - /mnt/docker-volumes/traefik/logs:/var/log/traefik
    environment:
      - TZ=${TZ}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - DOMAIN=${DOMAIN}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_DOMAINS_0_MAIN=${DOMAIN}
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_DOMAINS_0_SANS=*.${DOMAIN}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      start_period: 30s
      start_interval: 5s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=chain-local@file"
      - "traefik.http.routers.traefik-dashboard.tls.certResolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.traefik-dashboard.tls.domains[0].sans=*.${DOMAIN}"

  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.6
    container_name: crowdsec
    restart: unless-stopped
    networks:
      - crowdsec
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - /mnt/docker-volumes/traefik/logs:/var/log/traefik:ro
      - /mnt/docker-volumes/crowdsec/data:/var/lib/crowdsec/data
      - /mnt/docker-volumes/crowdsec/config:/etc/crowdsec
    environment:
      - TZ=${TZ}
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/appsec-crs
      - BOUNCER_KEY_traefik=${CROWDSEC_BOUNCER_API_KEY}
      - GID=1000
      - ENROLL_KEY=${CROWDSEC_ENROLL_KEY}
      - ENROLL_INSTANCE_NAME=homelab
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      start_period: 30s
      start_interval: 5s
      timeout: 5s
      retries: 3

  authelia:
    image: authelia/authelia:4.39.16
    container_name: authelia
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - proxy
    volumes:
      - ./authelia/configuration.yaml:/config/configuration.yml:ro
      - /mnt/docker-volumes/authelia:/data
    environment:
      - TZ=${TZ}
      - X_AUTHELIA_CONFIG_FILTERS=template
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - DOMAIN=${DOMAIN}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:9091/api/health || exit 1",
        ]
      interval: 30s
      start_period: 30s
      start_interval: 5s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authelia.middlewares=geoblock@file"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      - "traefik.http.routers.authelia.tls.certResolver=letsencrypt"
      - "traefik.http.routers.authelia.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.authelia.tls.domains[0].sans=*.${DOMAIN}"
