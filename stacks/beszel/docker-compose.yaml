networks:
  proxy:
    external: true
  internal:
    driver: bridge
    internal: true
  socket_proxy:
    driver: bridge
    internal: true

services:
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:3.2.14
    container_name: socket-proxy-beszel
    restart: unless-stopped
    networks:
      - socket_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - INFO=1
      - CONTAINERS=1
    read_only: true
    tmpfs:
      - /run
    security_opt:
      - no-new-privileges:true

  beszel:
    image: henrygd/beszel:0.18.4
    container_name: beszel
    restart: unless-stopped
    environment:
      - APP_URL=https://beszel.${DOMAIN}
    networks:
      - proxy
      - internal
    volumes:
      - /mnt/docker-volumes/beszel/panel:/beszel_data
    healthcheck:
      test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beszel.rule=Host(`beszel.${DOMAIN}`)"
      - "traefik.http.routers.beszel.middlewares=chain-local@file"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"
      - "traefik.http.routers.beszel.tls.certResolver=letsencrypt"
      - "traefik.http.routers.beszel.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.beszel.tls.domains[0].sans=*.${DOMAIN}"

  beszel-agent:
    image: henrygd/beszel-agent:0.18.4
    container_name: beszel-agent
    restart: unless-stopped
    depends_on:
      beszel:
        condition: service_healthy
    volumes:
      - /mnt/docker-volumes/beszel/agent:/var/lib/beszel-agent
    environment:
      - KEY=${BESZEL_AGENT_KEY}
      - TOKEN=${BESZEL_AGENT_TOKEN}
      - HUB_URL=http://beszel:8090
      - SKIP_GPU=true
      - DOCKER_HOST=tcp://socket-proxy:2375
    networks:
      - socket_proxy
      - internal
