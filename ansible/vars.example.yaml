# =============================================================================
# Homelab Variables & Secrets — Example
# =============================================================================
# Copy this file to vars.yaml and fill in real values:
#   cp vars.example.yaml vars.yaml

# Shared
timezone: "Europe/Kaliningrad"
domain: "example.com"

# =============================================================================
# Restic Backup
# =============================================================================

restic_password: "changeme"
restic_primary_repo: "/mnt/backups/restic"
restic_mirror_path: "/home/user/backups/restic"
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6
restic_keep_yearly: 1

# =============================================================================
# Reverse Proxy
# =============================================================================

# Traefik
cf_dns_api_token: "changeme"
acme_email: "changeme@changeme.com"
geoblock_allowed_ips:
  - 192.0.2.10            # single IPv4 address
  - 203.0.113.0/24        # IPv4 range in CIDR format
  - "2001:db8:1234::/48"  # IPv6 range in CIDR format

# CrowdSec
crowdsec_bouncer_api_key: "changeme"
crowdsec_enroll_key: "changeme"

# Authelia
authelia_jwt_secret: "changeme"
authelia_session_secret: "changeme"
authelia_storage_encryption_key: "changeme"

# =============================================================================
# Remnawave
# =============================================================================

remnawave_subdomain: "changeme" # Поддомен для панели. remnawave_subdomain.domain -> remnawave_subdomain.example.com
remnawave_subscription_page_subdomain: "changeme" # Поддомен для страницы подписок. remnawave_subscription_page_subdomain.domain -> remnawave_subscription_page_subdomain.example.com
remnawave_subscription_page_prefix: "changeme" # Рандомный путь, можно сгенерировать через openssl rand -hex 24 (чем длиннее, тем лучше)
remnawave_jwt_auth_secret: "changeme" # Обязательно сгенерировать через openssl rand -hex 64
remnawave_api_tokens_secret: "changeme" # Обязательно сгенерировать через openssl rand -hex 64
remnawave_api_token: "changeme" # Токен из настроек Remnawave -> API-токены (создается после первого запуска)

# =============================================================================
# Mihomo
# =============================================================================

mihomo_sub_url: "https://changeme"

# =============================================================================
# Drasl
# =============================================================================

drasl_first_admin_username: "changme"