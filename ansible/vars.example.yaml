# =============================================================================
# Homelab Variables & Secrets — Example
# =============================================================================
# Copy this file to vars.yaml and fill in real values:
#   cp vars.example.yaml vars.yaml

# Shared
timezone: "Europe/Kaliningrad"
domain: "example.com"

# =============================================================================
# Reverse Proxy
# =============================================================================

# Traefik
cf_dns_api_token: "changeme"
acme_email: "admin@example.com"

# CrowdSec
crowdsec_bouncer_api_key: "changeme"
crowdsec_enroll_key: "changeme"

# Authelia
authelia_jwt_secret: "changeme"
authelia_session_secret: "changeme"
authelia_storage_encryption_key: "changeme"
