- name: Ensure volume directories exist for {{ stack.name }}
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  loop: "{{ stack.volumes | default([]) }}"

- name: Set default excludes
  ansible.builtin.set_fact:
    base_excludes: 
      - "docker-compose.yaml"
      - "docker-compose.yml"
      - "compose.yaml"
      - "compose.yml"

- name: Calculate config hashes for {{ stack.name }}
  ansible.builtin.find:
    paths: "{{ stacks_dir }}/{{ stack.name }}"
    patterns: "*.yml,*.yaml,*.json,*.toml"
    recurse: yes
    excludes: "{{ base_excludes + (stack.config_excludes | default([])) }}"
  register: config_files

- name: Generate unified config hash
  ansible.builtin.set_fact:
    stack_config_hash: "{{ config_files.files | map(attribute='path') | sort | map('hash', 'sha1') | join('') | hash('sha1') }}"
  when: config_files.matched > 0

- name: Template .env for {{ stack.name }}
  ansible.builtin.template:
    src: "{{ stacks_dir }}/{{ stack.name }}/.env.j2"
    dest: "{{ stacks_dir }}/{{ stack.name }}/.env"
    mode: "0600"
    owner: "1000"
    group: "1000"

- name: Append config hashes to .env
  ansible.builtin.lineinfile:
    path: "{{ stacks_dir }}/{{ stack.name }}/.env"
    line: "CONFIG_HASH={{ stack_config_hash | default('none') }}"
    regexp: "^CONFIG_HASH="
    insertafter: EOF

- name: Deploy {{ stack.name }}
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ stacks_dir }}/{{ stack.name }}"
