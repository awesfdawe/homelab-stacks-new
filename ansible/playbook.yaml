- name: Deploy homelab stacks
  hosts: localhost
  gather_facts: false

  vars_files:
    - vars.yaml

  vars:
    stacks_dir: "{{ playbook_dir }}/../stacks"
    stacks:
      - name: reverse-proxy
        config_excludes:
          - "users_database.yml"
          - "dynamic"
        templates:
          - traefik/dynamic/middlewares.yaml.j2
        volumes:
          - /mnt/docker-volumes/traefik/acme
          - /mnt/docker-volumes/traefik/logs
          - /mnt/docker-volumes/crowdsec/data
          - /mnt/docker-volumes/crowdsec/config
          - path: /mnt/docker-volumes/authelia
            backup: true

      - name: blocky

      - name: vaultwarden
        volumes:
          - path: /mnt/docker-volumes/vaultwarden
            backup: true

      - name: remnawave
        volumes:
          - path: /mnt/docker-volumes/remnawave
            backup: true

      - name: mihomo
        templates:
          - config.yaml.j2

      - name: drasl
        templates:
          - config.toml.j2
        volumes:
          - path: /mnt/docker-volumes/drasl
            backup: true

  tasks:
    # ==========================================================================
    # Infrastructure
    # ==========================================================================
    - name: Ensure /mnt/docker-volumes exists
      ansible.builtin.file:
        path: /mnt/docker-volumes
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0750"
      tags: [infra, always]

    - name: Ensure Docker networks exist
      ansible.builtin.command:
        cmd: "docker network create {{ item }}"
      loop:
        - proxy
        - bypass
      register: network_result
      changed_when: network_result.rc == 0
      failed_when: network_result.rc != 0 and 'already exists' not in network_result.stderr
      tags: [infra, always]

    # ==========================================================================
    # Restic Backup Setup
    # ==========================================================================
    - name: Setup restic backup
      ansible.builtin.include_tasks:
        file: tasks/setup_restic.yaml
        apply:
          tags: [backup]
      tags: [backup, never]

    # ==========================================================================
    # Deploy stacks
    # ==========================================================================
    - name: Deploy stack
      ansible.builtin.include_tasks:
        file: tasks/deploy_stack.yaml
        apply:
          tags: "{{ stack.name }}"
      loop: "{{ stacks }}"
      loop_control:
        loop_var: stack
        label: "{{ stack.name }}"
      tags: always
